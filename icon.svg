<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep red brick -->
  <rect width="512" height="512" fill="#6B1010" rx="80"/>

  <!-- Brick texture lines horizontal -->
  <line x1="0" y1="200" x2="512" y2="200" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
  <line x1="0" y1="250" x2="512" y2="250" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
  <line x1="0" y1="300" x2="512" y2="300" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <line x1="0" y1="350" x2="512" y2="350" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <line x1="0" y1="400" x2="512" y2="400" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <line x1="0" y1="450" x2="512" y2="450" stroke="rgba(0,0,0,0.08)" stroke-width="2"/>

  <!-- Brick texture lines vertical offset -->
  <line x1="256" y1="200" x2="256" y2="250" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <line x1="128" y1="250" x2="128" y2="300" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <line x1="384" y1="250" x2="384" y2="300" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <line x1="256" y1="300" x2="256" y2="350" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <line x1="128" y1="350" x2="128" y2="400" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <line x1="384" y1="350" x2="384" y2="400" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>

  <!-- Roof / gable - dark -->
  <polygon points="256,52 420,195 92,195" fill="#3D0808"/>
  <!-- Roof ridge -->
  <rect x="92" y="190" width="328" height="12" fill="#FFFFFF" opacity="0.9"/>

  <!-- Chimney -->
  <rect x="320" y="80" width="28" height="60" fill="#4A0E0E"/>
  <rect x="316" y="76" width="36" height="10" fill="#5A1212"/>

  <!-- Windows row 1 -->
  <!-- W1 -->
  <rect x="118" y="215" width="68" height="80" rx="4" fill="white" opacity="0.92"/>
  <line x1="118" y1="255" x2="186" y2="255" stroke="#8B1A1A" stroke-width="3"/>
  <line x1="152" y1="215" x2="152" y2="295" stroke="#8B1A1A" stroke-width="3"/>
  <!-- W2 -->
  <rect x="222" y="215" width="68" height="80" rx="4" fill="white" opacity="0.92"/>
  <line x1="222" y1="255" x2="290" y2="255" stroke="#8B1A1A" stroke-width="3"/>
  <line x1="256" y1="215" x2="256" y2="295" stroke="#8B1A1A" stroke-width="3"/>
  <!-- W3 -->
  <rect x="326" y="215" width="68" height="80" rx="4" fill="white" opacity="0.92"/>
  <line x1="326" y1="255" x2="394" y2="255" stroke="#8B1A1A" stroke-width="3"/>
  <line x1="360" y1="215" x2="360" y2="295" stroke="#8B1A1A" stroke-width="3"/>

  <!-- Windows row 2 -->
  <!-- W4 -->
  <rect x="118" y="318" width="68" height="80" rx="4" fill="white" opacity="0.92"/>
  <line x1="118" y1="358" x2="186" y2="358" stroke="#8B1A1A" stroke-width="3"/>
  <line x1="152" y1="318" x2="152" y2="398" stroke="#8B1A1A" stroke-width="3"/>
  <!-- W5 (skip center for door) -->
  <!-- W6 -->
  <rect x="326" y="318" width="68" height="80" rx="4" fill="white" opacity="0.92"/>
  <line x1="326" y1="358" x2="394" y2="358" stroke="#8B1A1A" stroke-width="3"/>
  <line x1="360" y1="318" x2="360" y2="398" stroke="#8B1A1A" stroke-width="3"/>

  <!-- Door - Danish blue -->
  <rect x="210" y="368" width="92" height="132" rx="6" fill="#174EA6"/>
  <!-- Door frame white -->
  <rect x="207" y="365" width="98" height="8" fill="#FFFFFF" opacity="0.9"/>
  <!-- Door panel details -->
  <rect x="220" y="380" width="30" height="36" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="262" y="380" width="30" height="36" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="220" y="426" width="30" height="36" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="262" y="426" width="30" height="36" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Door knob -->
  <circle cx="294" cy="436" r="6" fill="#C8A84B"/>

  <!-- White base trim -->
  <rect x="80" y="496" width="352" height="10" fill="#FFFFFF" opacity="0.6"/>

  <!-- Dannebrog (Danish flag) top right corner -->
  <rect x="362" y="32" width="112" height="76" rx="4" fill="#C60C30"/>
  <!-- White cross vertical -->
  <rect x="400" y="32" width="16" height="76" fill="#FFFFFF"/>
  <!-- White cross horizontal -->
  <rect x="362" y="60" width="112" height="16" fill="#FFFFFF"/>
  <!-- Flag pole -->
  <rect x="358" y="22" width="5" height="90" fill="#D4A017" rx="2"/>

  <!-- White window sill details -->
  <rect x="114" y="293" width="76" height="6" fill="white" opacity="0.5" rx="2"/>
  <rect x="218" y="293" width="76" height="6" fill="white" opacity="0.5" rx="2"/>
  <rect x="322" y="293" width="76" height="6" fill="white" opacity="0.5" rx="2"/>
  <rect x="114" y="396" width="76" height="6" fill="white" opacity="0.5" rx="2"/>
  <rect x="322" y="396" width="76" height="6" fill="white" opacity="0.5" rx="2"/>
</svg>